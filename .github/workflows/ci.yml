name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: giant_projects_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d giant_projects_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/giant_projects_ci?schema=public
      BASE_URL: http://127.0.0.1:3000
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma:generate

      - name: Apply migrations
        run: pnpm exec prisma migrate deploy

      - name: Seed CI database
        run: pnpm prisma:seed

      - name: Verify project
        run: pnpm verify:full

      - name: Start application
        run: |
          pnpm start > next-start.log 2>&1 &
          echo $! > next-start.pid

      - name: Wait for application
        run: |
          for i in {1..45}; do
            if node -e "fetch(process.env.BASE_URL).then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"; then
              exit 0
            fi
            sleep 2
          done
          cat next-start.log
          exit 1

      - name: Smoke routes
        run: pnpm smoke:routes
